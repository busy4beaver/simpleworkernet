[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "simpleworkernet"
version = "0.0.3b33"
description = "Python клиент для API WorkerNet"
readme = "README.md"
authors = [
    { name="BusyBeaver", email="busybeaver.bb@gmail.com" },
]
license = {file = "LICENSE"}
requires-python = ">=3.8"
dependencies = [
    "requests>=2.25.0",
]

[project.scripts]
cleanup-simpleworkernet = "simpleworkernet.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["simpleworkernet*"]

[tool.setuptools.package-data]
simpleworkernet = ["py.typed"]

