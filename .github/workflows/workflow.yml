name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Тип изменения версии пакета'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Тестовый запуск (Сборка без публикации в PyPI)'
        required: true
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить зависимости для сборки
        run: |
          python -m pip install --upgrade pip build

      # Пример использования первого параметра: выведет тип версии в лог
      - name: Логирование выбранной версии
        run: echo "Выбран тип изменения версии - ${{ inputs.version_bump }}"

      - name: Собрать пакет
        run: python -m build

      # Шаг публикации теперь зависит от галочки dry_run
      - name: Опубликовать в PyPI
        if: ${{ inputs.dry_run == false }}
        uses: pypa/gh-action-pypi-publish@release/v1
