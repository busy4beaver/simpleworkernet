name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/simpleworkernet/

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить зависимости для сборки
        run: |
          python -m pip install --upgrade pip build

      - name: Собрать пакет
        run: python -m build

      - name: Опубликовать в PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
