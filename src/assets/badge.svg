<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="python-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3776AB"/>
      <stop offset="100%" stop-color="#1E466A"/>
    </linearGradient>
    <linearGradient id="python-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD43B"/>
      <stop offset="100%" stop-color="#FFE873"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Группа композиции (сдвинута в центр холста для красоты) -->
  <g transform="translate(10, 10)">
    <!-- Буква W (слева, от x=0) -->
    <text x="0" y="150"
          font-family="Arial, Helvetica, sans-serif"
          font-size="140"
          font-weight="800"
          fill="#1E293B"
          text-anchor="start">W</text>
    <!-- Буква N (после логотипа, без пробелов) -->
    <text x="170" y="150"
          font-family="Arial, Helvetica, sans-serif"
          font-size="140"
          font-weight="800"
          fill="#1E293B"
          text-anchor="start">N</text>
	<!-- Подпись внизу (жёлтым цветом, на всю ширину) -->
	<text x="138" y="40"
		font-family="Arial, Helvetica, sans-serif"
		font-size="25"
		font-weight="bold"
		fill="#FFA540"
		text-anchor="middle"
		letter-spacing="1">WorkerNet API Client</text>

    <!-- Логотип Python (после W, вертикально центрирован) -->
    <g transform="translate(120, 60) scale(0.75)" filter="url(#soft-shadow)">
      <path d="M47.6 0C21.4 0 23.3 11.3 23.3 11.3l.1 11.7h23.9v3.4H13.8C4.3 26.4 0 32.3 0 45.4c0 13.1 8 13.9 13.8 13.9h8.3v-11.7c0-6.4 5.5-11.9 11.9-11.9H60c6.4 0 11.4-4.7 11.4-11.2V13.8C71.4 4.5 61.2 0 47.6 0zM35.1 7.6a3.9 3.9 0 1 1 0 7.8 3.9 3.9 0 0 1 0-7.8z" fill="url(#python-blue)"/>
      <path d="M47.7 95.3c26.2 0 24.3-11.3 24.3-11.3l-.1-11.7H48v-3.4h33.5c9.5 0 13.8-5.9 13.8-19 0-13.1-8-13.9-13.8-13.9h-8.3v11.7c0 6.4-5.5 11.9-11.9 11.9H35.3c-6.4 0-11.4 4.7-11.4 11.2v20.7c0 9.3 10.2 13.8 23.8 13.8zm12.5-7.6a3.9 3.9 0 1 1 0-7.8 3.9 3.9 0 0 1 0-7.8z" fill="url(#python-yellow)"/>
    </g>

  </g>

</svg>